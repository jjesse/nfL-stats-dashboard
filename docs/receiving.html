<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 NFL Receiving Statistics</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #007bff;
            --card-bg: #2d2d2d;
            --border-color: #444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border-radius: 10px;
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 16px;
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .nav-links a:hover {
            background: var(--accent-color);
            color: white;
        }
        
        .stats-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .chart-container {
            text-align: center;
            margin: 20px 0;
        }
        
        .chart-container img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        
        .chart-error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #E74C3C;
            border-radius: 8px;
            padding: 15px;
            color: #E74C3C;
            text-align: center;
        }
        
        .data-table {
            margin-top: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        thead {
            background: rgba(0, 123, 255, 0.2);
            position: sticky;
            top: 0;
        }
        
        th {
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--accent-color);
            font-weight: 600;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        tr:hover {
            background: rgba(0, 123, 255, 0.1);
        }
        
        .stat-highlight {
            color: #2ECC71;
            font-weight: bold;
        }
        
        .last-updated {
            text-align: center;
            color: #888;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            header {
                padding: 15px;
            }
            
            .nav-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .nav-links a {
                margin: 5px;
                font-size: 0.9em;
            }
            
            table {
                font-size: 0.85em;
            }
            
            th, td {
                padding: 8px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 NFL Receiving Statistics</h1>
            <p>Top receivers with detailed performance metrics</p>
        </header>
        
        <div class="nav-links">
            <a href="index.html">🏠 Dashboard</a>
            <a href="passing.html">📊 Passing</a>
            <a href="rushing.html">🏃 Rushing</a>
            <a href="defense.html">🛡️ Defense</a>
            <a href="standings.html">📋 Standings</a>
            <a href="awards.html">🏆 Awards</a>
        </div>
        
        <div class="stats-section">
            <h2>📈 Receiving Leaders Chart</h2>
            <div class="chart-container" id="receivingChartContainer">
                <img src="receiving_stats.png" alt="Receiving Statistics Chart" onerror="handleChartError(this)">
            </div>
        </div>
        
        <div class="stats-section">
            <h2>📊 Complete Receiving Statistics</h2>
            <div class="data-table" id="receivingDataTable">
                <p class="loading">Loading receiving data...</p>
            </div>
        </div>
        
        <div class="last-updated" id="lastUpdated">
            Loading timestamp...
        </div>
    </div>
    
    <script src="js/common.js"></script>
    <script>
        // Handle chart loading errors
        function handleChartError(img) {
            const container = img.parentElement;
            container.innerHTML = '<div class="chart-error">⚠️ Chart not available. Please generate charts by running the data processors.</div>';
        }
        
        // Load receiving statistics from CSV
        function loadReceivingData() {
            fetch('receiving_stats.csv')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Data file not found');
                    }
                    return response.text();
                })
                .then(csvData => {
                    const rows = csvData.split('\n').filter(row => row.trim());
                    if (rows.length < 2) {
                        throw new Error('No data available');
                    }
                    
                    const headers = rows[0].split(',');
                    let tableHTML = '<table><thead><tr>';
                    
                    // Create header row
                    headers.forEach(header => {
                        tableHTML += `<th>${header.trim()}</th>`;
                    });
                    tableHTML += '</tr></thead><tbody>';
                    
                    // Create data rows
                    for (let i = 1; i < rows.length; i++) {
                        const cells = rows[i].split(',');
                        if (cells.length === headers.length) {
                            tableHTML += '<tr>';
                            cells.forEach((cell, index) => {
                                // Highlight key stats
                                const value = cell.trim();
                                if (index > 0 && !isNaN(value) && parseFloat(value) > 0) {
                                    tableHTML += `<td class="stat-highlight">${value}</td>`;
                                } else {
                                    tableHTML += `<td>${value}</td>`;
                                }
                            });
                            tableHTML += '</tr>';
                        }
                    }
                    
                    tableHTML += '</tbody></table>';
                    document.getElementById('receivingDataTable').innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error('Error loading receiving data:', error);
                    document.getElementById('receivingDataTable').innerHTML = 
                        '<div class="chart-error">⚠️ Receiving data not available. Please run the player-stats processor to generate the data.</div>';
                });
        }
        
        // Load last updated timestamp - custom for receiving page (uses different element ID)
        function loadLastUpdated() {
            fetch('last_updated_receiving.txt')
                .then(response => response.text())
                .then(timestamp => {
                    document.getElementById('lastUpdated').innerHTML = 
                        `Last updated: ${timestamp.trim()}`;
                })
                .catch(() => {
                    document.getElementById('lastUpdated').innerHTML = 
                        'Last updated: Unknown';
                });
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            loadReceivingData();
            loadLastUpdated();
        });
    </script>
</body>
</html>
